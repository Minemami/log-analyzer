name: Bash CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  syntax-check:
    name: 1 Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Skripte ausführbar machen
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Bash Syntax prüfen
        run: |
          bash -n scripts/*.sh
          bash -n tests/*.sh

  project-validation:
    name: 2 Projekt validieren
    runs-on: ubuntu-latest
    needs:
      - syntax-check

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Skripte ausführbar machen
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Projekt validieren
        run: bash scripts/02_validate_project.sh

  log-tests:
    name: 3 Tests ausführen
    runs-on: ubuntu-latest
    needs:
      - syntax-check
      - project-validation

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Skripte ausführbar machen
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Tests starten
        run: bash scripts/04_run_tests.sh

  build-report:
    name: 4 Report bauen
    runs-on: ubuntu-latest
    needs:
      - log-tests

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Skripte ausführbar machen
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Report erzeugen
        run: bash scripts/05_build_report.sh

      - name: Report als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: log-report
          path: dist/report.md

  package-project:
    name: 5 Projekt paketieren
    runs-on: ubuntu-latest
    needs:
      - build-report

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Skripte ausführbar machen
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Paket erstellen
        run: bash scripts/06_package_project.sh

      - name: Paket als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: log-analyzer-package
          path: artifact/log-analyzer-package.tar.gz